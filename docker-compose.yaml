name: unitycatalog

services:

  unitycatalog:
    image: unitycatalog/unitycatalog:latest
    hostname: unitycatalog
    container_name: unitycatalog
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: ./etc/conf
        target: /opt/unitycatalog/etc/conf
      - type: volume
        source: unitycatalog_data
        target: /opt/unitycatalog/etc/data
  
  deltalake:
    image: deltaio/delta-docker:4.1.0
    hostname: delta
    container_name: delta
    environment:
      - SPARK_LOCAL_HOSTNAME=localhost
      - PYSPARK_TOTAL_CORES=${PYSPARK_TOTAL_CORES:-4}
      - PYSPARK_DRIVER_MEMORY=${PYSPARK_DRIVER_MEMORY:-4g}
    volumes:
      - ./delta/startup.sh:/opt/spark/work-dir/startup.sh
    ports:
      - 8888-8889:8888-8889
      - 4040:4040
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 4G
    restart: unless-stopped

volumes:
  # Persist docker volume across container restarts
  unitycatalog_data: